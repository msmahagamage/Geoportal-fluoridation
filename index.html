<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fluoridation Geoportal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css?v=20260608-selected-well-highlight">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <p>Geoportal</p>
        <h1>Fluoridation Data Explorer</h1>
      </div>

      <section class="panel">
        <h2>Layers</h2>
        <div class="layerGroup">
          <p class="layerGroupTitle">Untreated groundwater wells</p>
          <label><input type="checkbox" id="wellToggle" checked> Groundwater wells</label>
          <div class="nestedLayerOptions">
            <label><input type="radio" name="wellDisplay" value="summary" checked> State summaries</label>
            <label><input type="radio" name="wellDisplay" value="individual"> Individual wells</label>
          </div>
        </div>
        <div class="layerGroup">
          <p class="layerGroupTitle">Community water fluoridation</p>
          <label><input type="checkbox" name="boundaryLayer" value="state" checked> State fluoridation</label>
          <label><input type="checkbox" name="boundaryLayer" value="county"> County fluoridation</label>
        </div>
        <div class="layerGroup">
          <p class="layerGroupTitle">County health access indicators</p>
          <label><input type="checkbox" name="boundaryLayer" value="food"> Limited healthy food access</label>
          <label><input type="checkbox" name="boundaryLayer" value="dental"> Dental care access</label>
        </div>
      </section>

      <section class="panel">
        <h2>Filters</h2>
        <label for="stateFilter">State</label>
        <select id="stateFilter">
          <option value="">All states</option>
        </select>
        <label for="wellTypeFilter">Well type</label>
        <select id="wellTypeFilter">
          <option value="">All well types</option>
        </select>
        <label for="fluorideRange">Minimum well fluoride (mg/L)</label>
        <input id="fluorideRange" type="range" min="0" max="5" value="0" step="0.1">
        <output id="fluorideRangeValue">0.0</output>
      </section>

    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Groundwater, counties, states, systems</p>
          <h2 id="viewTitle">State Fluoridation</h2>
        </div>
        <div class="metricStrip">
          <div><span id="metricCounties">0</span><small>Counties</small></div>
          <div><span id="metricWells">0</span><small id="metricWellsLabel">Visible wells</small></div>
          <div><span id="metricAverage">0%</span><small id="metricAverageLabel">Avg county fluoridation</small></div>
        </div>
      </header>

      <section class="mapBand">
        <div id="map" aria-label="Fluoridation map"></div>
        <div class="legend" id="legend"></div>
      </section>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?v=20260608-selected-well-highlight"></script>
  </body>
</html>
